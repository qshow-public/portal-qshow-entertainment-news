<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --dark: #0a0a0a; --card-bg: #161616; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); color: #fff; }
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top:0; z-index:100; }
        .logo-box h1 { color: var(--primary); font-size: 2rem; font-weight: 900; }
        .live-box { background: #1a1a1a; padding: 10px 20px; border-radius: 50px; border: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .container { padding: 20px 5%; max-width: 1400px; margin: 0 auto; }
        h2 { margin: 40px 0 20px; color: var(--primary); text-transform: uppercase; font-size: 1.5rem; border-left: 5px solid var(--primary); padding-left: 15px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; min-height: 100px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; border: 1px solid #222; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #222; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-body h3 { font-size: 1rem; line-height: 1.4; font-weight: 600; }
        .status-msg { grid-column: 1/-1; text-align: center; padding: 40px; color: #555; font-style: italic; }
        footer { background: #000; padding: 40px; text-align: center; border-top: 1px solid #222; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>Q'SHOW</h1>
        <p style="font-size: 0.7rem; color: #fff; letter-spacing: 2px;">UMA FESTA TODO DIA!</p>
    </div>
    <div class="live-box">
        <span style="color:var(--primary); font-weight: bold; font-size: 0.8rem; animation: blink 1s infinite;">● AO VIVO</span>
        <audio controls style="height: 30px; width: 130px;">
            <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
        </audio>
    </div>
</header>

<div class="container">
    <section>
        <h2><i class="fas fa-music"></i> Música</h2>
        <div id="grid-musica" class="news-grid"><div class="status-msg">Conectando ao portal de música...</div></div>
    </section>
    <section>
        <h2><i class="fas fa-trophy"></i> Esporte</h2>
        <div id="grid-esporte" class="news-grid"><div class="status-msg">Conectando ao portal de esportes...</div></div>
    </section>
    <section>
        <h2><i class="fas fa-film"></i> Filmes & Séries</h2>
        <div id="grid-filmes" class="news-grid"><div class="status-msg">Conectando ao portal de cinema...</div></div>
    </section>
    <section>
        <h2><i class="fas fa-tv"></i> Novelas</h2>
        <div id="grid-novelas" class="news-grid"><div class="status-msg">Conectando ao portal de novelas...</div></div>
    </section>
</div>

<footer>
    <p>Q'SHOW Entertainment News &copy; 2026</p>
    <p style="color: #444; font-size: 0.8rem; margin-top: 10px;">contato@qshow.com.br</p>
</footer>

<script>
    // Usaremos fontes variadas para evitar que se uma cair, todas caiam
    const CATEGORIES = {
        musica: 'https://g1.globo.com/dynamo/pop-arte/rss2.xml',
        esporte: 'https://noticias.r7.com/esportes/feed.xml',
        filmes: 'https://cinepop.com.br/feed',
        novelas: 'https://gshow.globo.com/rss/gshow/'
    };

    // Função que tenta carregar a notícia usando dois métodos diferentes
    async function loadCategory(cat, elementId) {
        const grid = document.getElementById(elementId);
        const rssUrl = CATEGORIES[cat];
        
        // Método 1: rss2json direto
        let data = await tryFetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
        
        // Método 2: Se falhar, tenta via AllOrigins Proxy
        if (!data) {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`)}`;
            const response = await tryFetch(proxyUrl);
            if (response && response.contents) {
                data = JSON.parse(response.contents);
            }
        }

        if (data && data.status === 'ok') {
            grid.innerHTML = '';
            data.items.slice(0, 4).forEach(item => {
                let img = item.thumbnail || (item.enclosure && item.enclosure.link) || 'https://images.unsplash.com/photo-1514525253361-bee8718a342b?w=400';
                grid.innerHTML += `
                    <a href="${item.link}" target="_blank" class="card">
                        <img src="${img}" alt="Q'SHOW News">
                        <div class="card-body">
                            <h3 style="color:#fff">${item.title}</h3>
                            <p style="font-size:0.7rem; color:var(--primary); margin-top:10px; font-weight:bold">VER MAIS</p>
                        </div>
                    </a>
                `;
            });
        } else {
            grid.innerHTML = '<div class="status-msg">Fonte em manutenção. Tente atualizar a página em instantes.</div>';
        }
    }

    async function tryFetch(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) return null;
            return await res.json();
        } catch (e) {
            return null;
        }
    }

    // Inicia o carregamento
    Object.keys(CATEGORIES).forEach(key => {
        loadCategory(key, `grid-${key}`);
    });
</script>

<style> @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } } </style>
</body>
</html>
