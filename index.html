<script>
    // Fontes Atualizadas 2026 - Troquei o Esporte pelo feed da CNN Brasil (mais estável)
    const CATEGORIES = {
        musica: 'https://g1.globo.com/dynamo/pop-arte/rss2.xml',
        esporte: 'https://www.cnnbrasil.com.br/esportes/feed/', 
        filmes: 'https://cinepop.com.br/feed',
        novelas: 'https://gshow.globo.com/rss/gshow/'
    };

    async function loadCategory(cat, elementId) {
        const grid = document.getElementById(elementId);
        const rssUrl = CATEGORIES[cat];
        
        // Imagem padrão caso o esporte venha sem foto
        const defaultImg = {
            musica: 'https://images.unsplash.com/photo-1514525253361-bee8718a342b?w=400',
            esporte: 'https://images.unsplash.com/photo-1504450758481-7338eba7524a?w=400',
            filmes: 'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400',
            novelas: 'https://images.unsplash.com/photo-1522869635100-9f4c5e86aa37?w=400'
        };

        // Tenta buscar via RSS2JSON com uma chave de segurança para evitar bloqueio
        let api_url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=oyebv0v0v0v0v0v0v0v0v0v0v0v0v0v0v0v0v0v0`;

        try {
            const res = await fetch(api_url);
            const data = await res.json();

            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = '';
                data.items.slice(0, 4).forEach(item => {
                    // Lógica para pegar a imagem correta (CNN Esportes usa estruturas diferentes)
                    let img = item.thumbnail || (item.enclosure && item.enclosure.link) || '';
                    if (!img || img === "") img = defaultImg[cat];

                    grid.innerHTML += `
                        <a href="${item.link}" target="_blank" class="card">
                            <img src="${img}" alt="Q'SHOW News" onerror="this.src='${defaultImg[cat]}'">
                            <div class="card-body">
                                <span style="font-size:0.6rem; color:var(--primary); font-weight:bold; text-transform:uppercase">${cat}</span>
                                <h3 style="color:#fff; margin-top:5px;">${item.title}</h3>
                            </div>
                        </a>
                    `;
                });
            } else {
                throw new Error("Falha no carregamento");
            }
        } catch (e) {
            grid.innerHTML = '<div class="status-msg">Atualizando placares de esporte... Tente atualizar a página.</div>';
        }
    }

    // Inicia o carregamento de todas as categorias
    window.onload = () => {
        loadCategory('musica', 'grid-musica');
        loadCategory('esporte', 'grid-esporte');
        loadCategory('filmes', 'grid-filmes');
        loadCategory('novelas', 'grid-novelas');
    };
</script>
