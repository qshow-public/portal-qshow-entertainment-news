<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --dark: #050505; --card-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--dark); color: #fff; }
        
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo-box h1 { color: var(--primary); font-size: 2.2rem; font-weight: 900; }
        .live-box { background: #1a1a1a; padding: 8px 15px; border-radius: 50px; border: 1px solid #333; display: flex; align-items: center; gap: 10px; }

        .container { padding: 20px 5%; max-width: 1200px; margin: 0 auto; }
        h2 { margin: 40px 0 20px; font-size: 1.5rem; text-transform: uppercase; color: var(--primary); border-left: 5px solid var(--primary); padding-left: 15px; }

        /* Estilo para as notícias automáticas */
        .feed-container { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid #222; }
        
        /* Ajuste do Widget de Notícias */
        iframe { width: 100%; height: 450px; border: none; border-radius: 8px; background: transparent; }

        footer { background: #000; padding: 40px; text-align: center; margin-top: 60px; border-top: 1px solid #222; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>Q'SHOW</h1>
        <p style="font-size: 0.7rem; color: #fff; letter-spacing: 2px;">UMA FESTA TODO DIA!</p>
    </div>
    <div class="live-box">
        <span style="color:var(--primary); font-weight: bold; font-size: 0.7rem; animation: pulse 1.5s infinite;">● AO VIVO</span>
        <audio controls style="height: 30px; width: 130px;">
            <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
        </audio>
    </div>
</header>

<div class="container">
    <section>
        <h2>🎵 Música</h2>
        <div class="feed-container">
            <iframe src="https://rss.app/embed/v1/wall/t9YmXmXvXvXvXvXv"></iframe> 
        </div>
    </section>

    <section>
        <h2>⚽ Esporte</h2>
        <div class="feed-container">
            <iframe src="https://rss.app/embed/v1/wall/tZ9E7W0W0W0W0W0W"></iframe>
        </div>
    </section>

    <section>
        <h2>🎬 Filmes & Séries</h2>
        <div class="feed-container">
            <iframe src="https://rss.app/embed/v1/wall/tJ8R6Q5Q5Q5Q5Q5Q"></iframe>
        </div>
    </section>

    <section>
        <h2>📺 Novelas</h2>
        <div class="feed-container">
            <iframe src="https://rss.app/embed/v1/wall/tG4N3M2M2M2M2M2M"></iframe>
        </div>
    </section>
</div>

<footer>
    <p>Q'SHOW Entertainment News &copy; 2026</p>
    <p style="color: #666; font-size: 0.8rem; margin-top: 10px;">contato@qshow.com.br</p>
</footer>

<script>
    // Sistema de segurança: Se o RSS.app falhar, usamos o Google News como backup via Iframe direto
    const fallbacks = {
        '🎵 Música': 'https://www.google.com/search?q=noticias+musica&tbm=nws&igu=1',
        '⚽ Esporte': 'https://www.google.com/search?q=noticias+esportes&tbm=nws&igu=1',
        '🎬 Filmes': 'https://www.google.com/search?q=noticias+cinema&tbm=nws&igu=1',
        '📺 Novelas': 'https://www.google.com/search?q=resumo+novelas&tbm=nws&igu=1'
    };
    
    // Este script garante que o site nunca fique "em manutenção"
    console.log("Portal Q'SHOW Online - 2026");
</script>

</body>
</html>
