<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --dark: #0a0a0a; --card-bg: #161616; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark); color: #fff; overflow-x: hidden; }
        
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); sticky: top; }
        .logo-box h1 { color: var(--primary); font-size: 2rem; font-weight: 900; font-style: italic; }
        .radio-box { background: #1a1a1a; padding: 10px 20px; border-radius: 50px; border: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        
        .container { padding: 20px 5%; }
        h2 { margin: 40px 0 20px; color: var(--primary); text-transform: uppercase; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
        h2::after { content: ""; flex: 1; height: 1px; background: #333; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; text-decoration: none; color: white; transition: 0.4s; border: 1px solid #222; position: relative; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(255,0,0,0.2); }
        .card img { width: 100%; height: 180px; object-fit: cover; filter: brightness(0.9); }
        .card-body { padding: 15px; }
        .card-body h3 { font-size: 1rem; line-height: 1.4; font-weight: 600; margin-top: 5px; }
        .date { font-size: 0.7rem; color: #777; margin-bottom: 5px; display: block; }

        footer { background: #000; padding: 50px 5%; text-align: center; border-top: 1px solid #222; margin-top: 60px; }
        .social { font-size: 1.5rem; margin-bottom: 20px; }
        .social a { color: #fff; margin: 0 15px; transition: 0.3s; }
        .social a:hover { color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>Q'SHOW</h1>
        <p style="font-size: 0.7rem; color: #fff; letter-spacing: 2px;">UMA FESTA TODO DIA!</p>
    </div>
    <div class="radio-box">
        <span style="color:var(--primary); font-weight: bold; font-size: 0.8rem;">RADIO ON</span>
        <audio controls style="height: 30px; width: 120px;">
            <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
        </audio>
    </div>
</header>

<div class="container">
    <section>
        <h2><i class="fas fa-music"></i> Música</h2>
        <div id="grid-musica" class="news-grid"></div>
    </section>

    <section>
        <h2><i class="fas fa-trophy"></i> Esportes</h2>
        <div id="grid-esporte" class="news-grid"></div>
    </section>

    <section>
        <h2><i class="fas fa-film"></i> Filmes & Séries</h2>
        <div id="grid-filmes" class="news-grid"></div>
    </section>

    <section>
        <h2><i class="fas fa-tv"></i> Novelas</h2>
        <div id="grid-novelas" class="news-grid"></div>
    </section>
</div>

<footer>
    <div class="social">
        <a href="https://www.instagram.com/qshowweb"><i class="fab fa-instagram"></i></a>
        <a href="https://m.youtube.com/@qshowweb"><i class="fab fa-youtube"></i></a>
    </div>
    <p>contato@qshow.com.br</p>
    <p style="color: #444; font-size: 0.8rem; margin-top: 10px;">Portal Q'SHOW Entertainment News &copy; 2026</p>
</footer>

<script>
    // Configurações de fontes RSS estáveis e filtragem
    const config = {
        musica: { url: 'https://g1.globo.com/dynamo/pop-arte/rss2.xml', keywords: ['música', 'show', 'cantor', 'cantora', 'álbum', 'concerto', 'rock', 'pop'] },
        esporte: { url: 'https://www.gazetaesportiva.com/feed/', keywords: [] },
        filmes: { url: 'https://g1.globo.com/dynamo/pop-arte/rss2.xml', keywords: ['filme', 'série', 'cinema', 'estreia', 'hollywood', 'netflix', 'ator', 'atriz'] },
        novelas: { url: 'https://gshow.globo.com/rss/gshow/', keywords: [] }
    };

    async function loadCategory(catKey, elementId) {
        const grid = document.getElementById(elementId);
        grid.innerHTML = '<p style="color:#444">Atualizando notícias...</p>';
        
        // Proxy para evitar bloqueio e converter XML para JSON
        const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(config[catKey].url)}&api_key=4vshv7z8xub0qmx9qg0z0m8k8yjw5p6idv0r7qjr`;

        try {
            const res = await fetch(api);
            const data = await res.json();

            if (data.status === 'ok') {
                grid.innerHTML = '';
                let count = 0;

                data.items.forEach(item => {
                    const title = item.title.toLowerCase();
                    const desc = item.description.toLowerCase();
                    const filter = config[catKey].keywords;

                    // Lógica de filtragem: se tiver palavras-chave, filtra. Se não (esporte/novela), passa tudo.
                    const isMatch = filter.length === 0 || filter.some(word => title.includes(word) || desc.includes(word));

                    if (isMatch && count < 4) {
                        let img = item.thumbnail || (item.enclosure && item.enclosure.link) || 'https://images.unsplash.com/photo-1514525253361-bee8718a342b?w=400';
                        
                        grid.innerHTML += `
                            <a href="${item.link}" target="_blank" class="card">
                                <img src="${img}" alt="QSHOW News">
                                <div class="card-body">
                                    <span class="date">${new Date(item.pubDate).toLocaleDateString('pt-BR')}</span>
                                    <h3>${item.title}</h3>
                                </div>
                            </a>
                        `;
                        count++;
                    }
                });
            }
        } catch (e) {
            grid.innerHTML = '<p>Erro ao conectar. Tente atualizar a página.</p>';
        }
    }

    // Carregar todas as seções
    loadCategory('musica', 'grid-musica');
    loadCategory('esporte', 'grid-esporte');
    loadCategory('filmes', 'grid-filmes');
    loadCategory('novelas', 'grid-novelas');
</script>

</body>
</html>
