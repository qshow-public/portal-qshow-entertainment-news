<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW - Portal de Notícias 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Estilo Inspirado na Netflix (Preto e Vermelho) */
        :root { --cor-principal: #ff0000; --fundo: #0a0a0a; --cartao: #1a1a1a; }
        
        body { background-color: var(--fundo); color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; }
        
        /* Cabeçalho Fixo */
        header { 
            background: #000; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 4px solid var(--cor-principal);
            position: sticky; top: 0; z-index: 999;
        }
        .logo h1 { color: var(--cor-principal); margin: 0; font-size: 2.5rem; letter-spacing: -1px; }
        .logo p { margin: 0; font-size: 0.8rem; text-transform: uppercase; color: #ccc; }

        /* Player da Q'SHOW */
        .player-vivo { 
            background: #222; padding: 10px 20px; border-radius: 50px; 
            display: flex; align-items: center; gap: 15px; border: 1px solid #444;
        }
        .bola-vermelha { width: 10px; height: 10px; background: red; border-radius: 50%; animation: pisca 1s infinite; }

        /* Conteúdo das Notícias */
        .container { padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        h2 { 
            color: var(--cor-principal); text-transform: uppercase; 
            border-left: 6px solid var(--cor-principal); padding-left: 15px;
            margin: 50px 0 20px 0; font-size: 1.8rem;
        }

        /* Moldura para as Notícias (Garante que apareçam sempre) */
        .bloco-noticias { 
            background: var(--cartao); border-radius: 15px; 
            overflow: hidden; border: 1px solid #333; margin-bottom: 30px;
            min-height: 500px; width: 100%;
        }

        iframe { width: 100%; height: 600px; border: none; }

        footer { background: #000; padding: 50px; text-align: center; border-top: 1px solid #222; }
        
        @keyframes pisca { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Q'SHOW</h1>
        <p>Uma Festa Todo Dia!</p>
    </div>
    <div class="player-vivo">
        <div class="bola-vermelha"></div>
        <span style="font-weight: bold; font-size: 0.9rem;">AO VIVO</span>
        <audio controls style="height: 35px; width: 150px;">
            <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
        </audio>
    </div>
</header>

<div class="container">
    
    <section>
        <h2><i class="fas fa-music"></i> Notícias de Música</h2>
        <div class="bloco-noticias">
            <iframe src="https://www.google.com/search?q=noticias+musica+entretenimento&tbm=nws&igu=1"></iframe>
        </div>
    </section>

    <section>
        <h2><i class="fas fa-trophy"></i> Esportes</h2>
        <div class="bloco-noticias">
            <iframe src="https://www.google.com/search?q=noticias+esportes+brasil&tbm=nws&igu=1"></iframe>
        </div>
    </section>

    <section>
        <h2><i class="fas fa-film"></i> Filmes & Séries</h2>
        <div class="bloco-noticias">
            <iframe src="https://www.google.com/search?q=lançamentos+netflix+cinema+noticias&tbm=nws&igu=1"></iframe>
        </div>
    </section>

    <section>
        <h2><i class="fas fa-tv"></i> Novelas</h2>
        <div class="bloco-noticias">
            <iframe src="https://www.google.com/search?q=resumo+das+novelas+gshow&tbm=nws&igu=1"></iframe>
        </div>
    </section>

</div>

<footer>
    <div style="font-size: 1.5rem; margin-bottom: 20px;">
        <a href="https://www.instagram.com/qshowweb" style="color:white; margin: 0 15px;"><i class="fab fa-instagram"></i></a>
        <a href="https://m.youtube.com/@qshowweb" style="color:white; margin: 0 15px;"><i class="fab fa-youtube"></i></a>
    </div>
    <p>Portal Q'SHOW Entertainment News &copy; 2026</p>
    <p style="color: #666; font-size: 0.8rem;">contato@qshow.com.br</p>
</footer>

</body>
</html>
