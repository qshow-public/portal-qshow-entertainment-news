<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --dark: #050505; --card-bg: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--dark); color: #fff; line-height: 1.5; }
        
        /* Header Moderno */
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo-box h1 { color: var(--primary); font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }
        .radio-box { background: #222; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; border: 1px solid #333; }

        /* Container e Títulos */
        .container { padding: 20px 5%; max-width: 1400px; margin: 0 auto; }
        h2 { margin: 40px 0 20px; font-size: 1.6rem; text-transform: uppercase; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        h2 i { color: #fff; }

        /* Grid de Cards */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; min-height: 150px; }
        
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; border: 1px solid #222; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(255,0,0,0.3); }
        .card img { width: 100%; height: 170px; object-fit: cover; background: #222; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-body h3 { font-size: 1rem; font-weight: 600; color: #efefef; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .category-tag { font-size: 0.65rem; font-weight: bold; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* Status de Carregamento */
        .status { grid-column: 1/-1; text-align: center; padding: 40px; color: #444; font-size: 0.9rem; }

        footer { background: #000; padding: 40px 5%; text-align: center; margin-top: 60px; border-top: 1px solid #222; }
        .social a { color: #fff; font-size: 1.8rem; margin: 0 15px; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>Q'SHOW</h1>
        <p style="font-size: 0.7rem; color: #fff; letter-spacing: 2px; margin-top: -5px;">UMA FESTA TODO DIA!</p>
    </div>
    <div class="radio-box">
        <span style="color:var(--primary); font-weight: bold; font-size: 0.7rem; animation: blink 1s infinite;">● AO VIVO</span>
        <audio controls style="height: 30px; width: 130px;">
            <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
        </audio>
    </div>
</header>

<div class="container">
    <section>
        <h2><i class="fas fa-music"></i> Música</h2>
        <div id="grid-musica" class="news-grid"><div class="status">Sintonizando...</div></div>
    </section>

    <section>
        <h2><i class="fas fa-trophy"></i> Esporte</h2>
        <div id="grid-esporte" class="news-grid"><div class="status">Buscando resultados...</div></div>
    </section>

    <section>
        <h2><i class="fas fa-film"></i> Filmes & Séries</h2>
        <div id="grid-filmes" class="news-grid"><div class="status">Carregando estreias...</div></div>
    </section>

    <section>
        <h2><i class="fas fa-tv"></i> Novelas</h2>
        <div id="grid-novelas" class="news-grid"><div class="status">Últimos capítulos...</div></div>
    </section>
</div>

<footer>
    <div class="social">
        <a href="https://www.instagram.com/qshowweb" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://m.youtube.com/@qshowweb" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
    <p style="margin: 15px 0;">contato@qshow.com.br</p>
    <p style="color: #444; font-size: 0.8rem;">Q'SHOW Entertainment News &copy; 2026</p>
</footer>

<script>
    // Fontes variadas para garantir que sempre haja conteúdo
    const FEEDS = {
        musica: 'https://g1.globo.com/dynamo/pop-arte/rss2.xml',
        esporte: 'https://www.gazetaesportiva.com/feed/',
        filmes: 'https://cinepop.com.br/feed',
        novelas: 'https://gshow.globo.com/rss/gshow/'
    };

    async function getNews(category, elementId) {
        const grid = document.getElementById(elementId);
        
        // Usando a API rss2json com uma chave reserva para evitar bloqueios
        const rssUrl = FEEDS[category];
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=oyebv0v0v0v0v0v0v0v0v0v0v0v0v0v0v0v0v0v0`; 

        try {
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.status === 'ok' && data.items.length > 0) {
                grid.innerHTML = '';
                data.items.slice(0, 4).forEach(item => {
                    // Busca imagem no conteúdo se não tiver thumbnail oficial
                    let img = item.thumbnail || (item.enclosure && item.enclosure.link) || '';
                    if (!img) img = 'https://images.unsplash.com/photo-1514525253361-bee8718a342b?w=500&q=80';

                    grid.innerHTML += `
                        <a href="${item.link}" target="_blank" class="card">
                            <img src="${img}" alt="Notícia Q'SHOW">
                            <div class="card-body">
                                <span class="category-tag">${category}</span>
                                <h3>${item.title}</h3>
                            </div>
                        </a>
                    `;
                });
            } else {
                throw new Error("Falha no feed");
            }
        } catch (error) {
            grid.innerHTML = `<div class="status">Notícias de ${category} sendo atualizadas. Verifique em instantes.</div>`;
        }
    }

    // Carregar ao iniciar
    window.onload = () => {
        getNews('musica', 'grid-musica');
        getNews('esporte', 'grid-esporte');
        getNews('filmes', 'grid-filmes');
        getNews('novelas', 'grid-novelas');
    };
</script>

<style>
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
</style>

</body>
</html>
