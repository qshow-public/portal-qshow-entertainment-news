<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW Entertainment News</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff0000; --dark: #080808; --card-bg: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--dark); color: #fff; }
        
        header { background: #000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 1000; }
        .logo-box h1 { color: var(--primary); font-size: 2rem; font-weight: 900; }
        .radio-box { background: #222; padding: 5px 15px; border-radius: 30px; display: flex; align-items: center; gap: 10px; border: 1px solid #444; }

        .container { padding: 20px 5%; max-width: 1200px; margin: 0 auto; }
        h2 { margin: 40px 0 20px; font-size: 1.5rem; text-transform: uppercase; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 10px; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        
        .card { background: var(--card-bg); border-radius: 10px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; border: 1px solid #333; height: 100%; display: flex; flex-direction: column; }
        .card:hover { transform: scale(1.02); border-color: var(--primary); }
        .card img { width: 100%; height: 160px; object-fit: cover; background: #222; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card-body h3 { font-size: 1rem; line-height: 1.3; margin: 5px 0; color: #fff; }
        
        .loading { padding: 20px; color: #666; font-style: italic; }
        footer { background: #000; padding: 40px; text-align: center; margin-top: 50px; border-top: 1px solid #222; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <h1>Q'SHOW</h1>
        <p style="font-size: 0.6rem; color: #fff; letter-spacing: 2px;">UMA FESTA TODO DIA!</p>
    </div>
    <div class="radio-box">
        <span style="color:var(--primary); font-weight: bold; font-size: 0.7rem;">AO VIVO</span>
        <audio controls style="height: 30px; width: 130px;">
            <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
        </audio>
    </div>
</header>

<div class="container">
    <section>
        <h2><i class="fas fa-music"></i> Música</h2>
        <div id="musica" class="news-grid"><p class="loading">Carregando...</p></div>
    </section>

    <section>
        <h2><i class="fas fa-trophy"></i> Esporte</h2>
        <div id="esporte" class="news-grid"><p class="loading">Carregando...</p></div>
    </section>

    <section>
        <h2><i class="fas fa-film"></i> Filmes & Séries</h2>
        <div id="filmes" class="news-grid"><p class="loading">Carregando...</p></div>
    </section>

    <section>
        <h2><i class="fas fa-tv"></i> Novelas</h2>
        <div id="novelas" class="news-grid"><p class="loading">Carregando...</p></div>
    </section>
</div>

<footer>
    <p>Q'SHOW Entertainment News - 2026</p>
    <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">contato@qshow.com.br</p>
</footer>

<script>
    // Usando fontes ultra-estáveis de 2026
    const feeds = {
        musica: 'https://g1.globo.com/dynamo/pop-arte/rss2.xml',
        esporte: 'https://noticias.r7.com/esportes/feed.xml',
        filmes: 'https://cinepop.com.br/feed',
        novelas: 'https://gshow.globo.com/rss/gshow/'
    };

    async function loadNews(category, elementId) {
        const container = document.getElementById(elementId);
        
        // NOVO PROXY: AllOrigins evita o erro de "notícias sendo atualizadas" e pula o bloqueio de CORS
        const proxyUrl = "https://api.allorigins.win/get?url=";
        const targetUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feeds[category])}`;

        try {
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            const outerData = await response.json();
            const data = JSON.parse(outerData.contents); // Decodifica o conteúdo do proxy

            if (data.status === 'ok') {
                container.innerHTML = '';
                data.items.slice(0, 4).forEach(item => {
                    let img = item.thumbnail || (item.enclosure && item.enclosure.link) || 'https://images.unsplash.com/photo-1514525253361-bee8718a342b?w=400';
                    
                    container.innerHTML += `
                        <a href="${item.link}" target="_blank" class="card">
                            <img src="${img}" alt="News">
                            <div class="card-body">
                                <small style="color:${category === 'esporte' ? '#00ff00' : 'var(--primary)'}; font-size: 0.7rem; font-weight:bold;">HOJE</small>
                                <h3>${item.title}</h3>
                            </div>
                        </a>
                    `;
                });
            }
        } catch (error) {
            container.innerHTML = '<p style="color:#444">Atualizando fonte...</p>';
            console.log("Erro na categoria " + category);
        }
    }

    // Chama as funções individualmente para não travarem uma a outra
    loadNews('musica', 'musica');
    loadNews('esporte', 'esporte');
    loadNews('filmes', 'filmes');
    loadNews('novelas', 'novelas');
</script>

</body>
</html>
